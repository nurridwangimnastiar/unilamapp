#pubspec.yaml
name: unilamapp
description: "Aplikasi resmi Universitas La Tansa Mashiro"
publish_to: 'none' 
version: 1.1.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigasi
  get: ^4.6.6

  # Koneksi API
  dio: ^5.4.0

  # Format tanggal dan angka
  intl: ^0.19.0

  # Tampil & simpan cache gambar
  cached_network_image: ^3.3.1

  # Render konten HTML berita
  flutter_html: ^3.0.0-beta.2

  # Ikon standar
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0   

# Konfigurasi ikon aplikasi
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"       
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
