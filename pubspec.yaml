name: unilamapp
description: "Aplikasi resmi Universitas La Tansa Mashiro"
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Paket untuk koneksi API
  http: ^1.2.0

  # Format tanggal dan angka
  intl: ^0.19.0

  # Tampil & simpan cache gambar (penting untuk performa)
  cached_network_image: ^3.3.1

  # Render konten HTML berita (pengganti parsing manual)
  flutter_html: ^3.0.0-beta.2
  # *Catatan: Jika butuh render gambar/video di dalam HTML, tambahkan ini juga:
  # flutter_html_image: ^3.0.0-beta.2
  # flutter_html_video: ^3.0.0-beta.2

  # Ikon standar
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0   

# 👇 KONFIGURASI IKON WAJIB DI LUAR BAGIAN "flutter:" 👇
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"       
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true   # <-- SPASI DI DEPAN WAJIB ADA
  assets:                      # <-- DAFTAR ASSET WAJIB ADA
    - assets/images/
